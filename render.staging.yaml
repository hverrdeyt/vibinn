databases:
  - name: vibecheck-db-staging
    databaseName: vibecheck_travel_staging
    user: vibecheck_travel_staging
    plan: free

services:
  - type: web
    name: vibecheck-api-staging
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run prisma:v2:generate:staging && npm run prisma:v2:migrate:deploy:staging
    startCommand: npm run start:server:staging
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: vibecheck-db-staging
          property: connectionString
      - key: DATABASE_URL_V2
        sync: false
      - key: API_ORIGIN
        value: https://vibecheck-api-staging.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_IOS_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_IDS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: ENABLE_RUNTIME_AI
        value: "false"
      - key: VONAGE_API_KEY
        sync: false
      - key: VONAGE_API_SECRET
        sync: false
      - key: VONAGE_VERIFY_BRAND
        value: Vibinn Staging
      - key: VONAGE_VERIFY_CODE_LENGTH
        value: "4"
      - key: VONAGE_VERIFY_PIN_EXPIRY_SECONDS
        value: "300"
      - key: VONAGE_VERIFY_WORKFLOW_ID
        value: "1"
      - key: V2_STAGING_FIXED_OTP_CODE
        value: "1234"
      - key: V2_SESSION_TTL_MS
        value: "2592000000"
      - key: TICKETMASTER_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: UNSUPPORTED_CITY_GATE_ENABLED
        value: "true"
