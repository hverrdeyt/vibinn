databases:
  - name: vibecheck-db
    databaseName: vibecheck_travel
    user: vibecheck_travel
    plan: free
  - name: vibecheck-db-v2
    databaseName: vibecheck_travel_v2
    user: vibecheck_travel_v2
    plan: free

services:
  - type: web
    name: vibecheck-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build && npm run prisma:generate:production && npm run prisma:v2:generate:production && npm run prisma:migrate:deploy:production && npm run prisma:v2:migrate:deploy:production
    startCommand: npm run start:server:production
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vibecheck-db
          property: connectionString
      - key: DATABASE_URL_V2
        fromDatabase:
          name: vibecheck-db-v2
          property: connectionString
      - key: API_ORIGIN
        value: https://api.vibinn.club
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_IOS_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_IDS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: ENABLE_RUNTIME_AI
        value: "true"
      - key: VONAGE_API_KEY
        sync: false
      - key: VONAGE_API_SECRET
        sync: false
      - key: VONAGE_VERIFY_BRAND
        value: Vibinn
      - key: VONAGE_VERIFY_CODE_LENGTH
        value: "6"
      - key: VONAGE_VERIFY_PIN_EXPIRY_SECONDS
        value: "300"
      - key: VONAGE_VERIFY_WORKFLOW_ID
        value: "1"
      - key: V2_SESSION_TTL_MS
        value: "2592000000"
      - key: TICKETMASTER_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: UNSUPPORTED_CITY_GATE_ENABLED
        value: "false"

  - type: web
    name: vibecheck-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.vibinn.club
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
