databases:
  - name: vibecheck-db
    databaseName: vibecheck_travel
    user: vibecheck_travel
    plan: free

services:
  - type: web
    name: vibecheck-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run prisma:migrate:deploy
    startCommand: npm run start:server
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vibecheck-db
          property: connectionString
      - key: API_ORIGIN
        value: https://api.vibinn.club
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: TICKETMASTER_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

  - type: web
    name: vibecheck-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.vibinn.club
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
